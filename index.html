<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Beer Set | Львів</title>
    <style>
        /* Основні стилі для всього сайту */
        body { margin: 0; padding: 0; background-color: #0f0f12; color: #fff; font-family: sans-serif; }
        .container { width: 90%; max-width: 600px; margin: 0 auto; text-align: center; }
        
        header { background: #16161a; padding: 20px 0; border-bottom: 2px solid #ff9f1c; }
        h1, h2 { color: #ff9f1c; margin-bottom: 20px; }
        
        .btn { display: block; background: #ff9f1c; color: #000; padding: 15px; text-decoration: none; border-radius: 10px; font-weight: bold; margin: 20px 0; }
        
        /* Секція адрес з фіксованим скролом */
        .stores-section { padding: 40px 0; }
        .accordion-btn { 
            background: #1f1f24; color: #fff; border: 1px solid #ff9f1c; 
            padding: 20px; width: 100%; text-align: left; cursor: pointer; border-radius: 8px; font-size: 18px;
        }
        
        /* ЦЯ ЧАСТИНА ВІДПОВІДАЄ ЗА СКРОЛ */
        .accordion-content { 
            max-height: 0; 
            overflow-y: auto;          /* Вмикає прокрутку всередині блоку */
            -webkit-overflow-scrolling: touch; /* Робить скрол плавним на телефонах */
            transition: max-height 0.4s ease-out; 
            background: #16161a;
            border-radius: 0 0 8px 8px;
        }
        
        .address-list { list-style: none; padding: 0; margin: 0; }
        .address-list li a { 
            display: block; padding: 20px; border-bottom: 1px solid #2a2a32; 
            color: #ccc; text-decoration: none; font-size: 18px; 
        }
    </style>
</head>
<body>

    <header>
        <div class="container">
            <h2>BeerSet</h2>
        </div>
    </header>

    <div class="container">
        <h1>Твій ідеальний пивний сет</h1>
        <a href="tel:+380686003664" class="btn">Зателефонувати нам</a>
    </div>

    <section class="stores-section">
        <div class="container">
            <button class="accordion-btn" onclick="toggle()">Наші магазини ▼</button>
            <div id="list" class="accordion-content">
                <ul class="address-list">
                    <li><a href="#">📍 Сахарова, 50</a></li>
                    <li><a href="#">📍 Антоновича, 20а</a></li>
                    <li><a href="#">📍 Варшавська, 54</a></li>
                    <li><a href="#">📍 Наукова, 112</a></li>
                    <li><a href="#">📍 Чорновола, 23</a></li>
                    <li><a href="#">📍 Сихівська, 2</a></li>
                    <li><a href="#">📍 Героїв УПА, 10</a></li>
                    <li><a href="#">📍 Княгині Ольги, 5</a></li>
                    <li><a href="#">📍 Стрийська, 45</a></li>
                    <li><a href="#">📍 Личаківська, 101</a></li>
                </ul>
            </div>
        </div>
    </section>

    <script>
        function toggle() {
            var el = document.getElementById("list");
            // Якщо блок закритий, відкриваємо його на 300 пікселів (далі скрол спрацює сам)
            if (el.style.maxHeight && el.style.maxHeight !== "0px") {
                el.style.maxHeight = "0px";
            } else {
                el.style.maxHeight = "300px"; 
            }
        }
    </script>
</body>
</html>
